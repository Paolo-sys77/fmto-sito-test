<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMTO 2.0 — Rosa</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:     #0d1117;
  --bg2:    #10161f;
  --surface:#131b26;
  --card:   #161e2b;
  --card2:  #1a2435;
  --border: #1e2d40;
  --accent: #4ab3f4;
  --accent2:#2196d8;
  --text:   #c9d8e8;
  --text2:  #516475;
  --white:  #eaf2fa;
  --cyan:   #00e5ff;
  --green:  #4ade80;
  --yellow: #facc15;
  --red:    #f87171;
  --purple: #c084fc;
}

body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 1.2rem; height:50px; display:flex; align-items:center; justify-content:space-between; }
.nav-logo { font-family:'Oswald',sans-serif; font-size:1.15rem; font-weight:700; color:var(--cyan); letter-spacing:2px; text-shadow:0 0 12px rgba(0,229,255,.35); white-space:nowrap; text-decoration:none; }
.topbar-right { display:flex; gap:.3rem; align-items:center; }
.topbar-btn { background:none; border:none; color:var(--text2); cursor:pointer; font-family:'Barlow',sans-serif; font-size:.75rem; padding:5px 9px; border-radius:4px; transition:color .2s,background .2s; display:flex; align-items:center; gap:4px; white-space:nowrap; text-decoration:none; }
.topbar-btn:hover { color:var(--accent); background:rgba(74,179,244,.07); }
.topbar-btn.watchlist-btn { border:1px solid var(--border); border-radius:20px; padding:4px 12px; }

/* PAGE */
.page-wrap { max-width:1100px; margin:0 auto; padding:1.2rem 1.2rem 3rem; }

/* breadcrumb */
.breadcrumb { display:flex; align-items:center; gap:.5rem; margin-bottom:1rem; }
.bread-back { background:var(--card); border:1px solid var(--border); color:var(--text2); padding:.3rem .8rem; border-radius:6px; font-size:.76rem; font-family:'Barlow',sans-serif; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:.35rem; transition:all .15s; text-decoration:none; }
.bread-back:hover { border-color:var(--accent); color:var(--accent); }
.bread-back svg { width:13px; height:13px; }
.bread-sep { color:var(--text2); font-size:.78rem; }
.bread-current { font-size:.78rem; color:var(--cyan); font-weight:600; }

/* header */
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:.6rem; }
.squad-title { font-family:'Oswald',sans-serif; font-size:1.4rem; font-weight:700; letter-spacing:3px; color:var(--white); }

/* stat strip */
.stat-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:.6rem; margin-bottom:1.2rem; }
.stat-tile { background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:.85rem .8rem; text-align:center; }
.stat-tile-val { font-family:'Oswald',sans-serif; font-size:1.6rem; font-weight:700; line-height:1.1; margin-bottom:.2rem; }
.stat-tile-label { font-size:.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--text2); }
.tile-ca  .stat-tile-val { color:var(--cyan); }
.tile-pa  .stat-tile-val { color:var(--purple); }
.tile-age .stat-tile-val { color:var(--yellow); }
.tile-u23 .stat-tile-val { color:var(--green); }

/* sort bar */
.sort-bar { display:flex; align-items:center; gap:.5rem; margin-bottom:.8rem; flex-wrap:wrap; }
.sort-label { font-size:.72rem; color:var(--text2); letter-spacing:1px; text-transform:uppercase; }
.sort-btn { background:var(--card); border:1px solid var(--border); color:var(--text2); padding:.28rem .7rem; border-radius:5px; font-size:.73rem; font-family:'Barlow',sans-serif; font-weight:600; cursor:pointer; transition:all .15s; }
.sort-btn:hover { border-color:var(--accent); color:var(--accent); }
.sort-btn.active { background:rgba(74,179,244,.1); border-color:var(--accent); color:var(--accent); }

/* tabella */
.table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:10px; }

table.rosa-table { width:100%; border-collapse:collapse; font-size:.82rem; min-width:560px; }
table.rosa-table thead tr { background:var(--surface); border-bottom:1px solid var(--border); }
table.rosa-table thead th { padding:.62rem .9rem; text-align:left; font-family:'Oswald',sans-serif; font-size:.67rem; letter-spacing:2px; text-transform:uppercase; color:var(--text2); font-weight:400; white-space:nowrap; cursor:pointer; user-select:none; }
table.rosa-table thead th:hover { color:var(--accent); }
table.rosa-table thead th.sorted { color:var(--cyan); }
table.rosa-table thead th.sorted::after { content:' ↓'; font-size:.6rem; }
table.rosa-table thead th.sorted.asc::after { content:' ↑'; }

table.rosa-table tbody tr { border-bottom:1px solid rgba(30,45,64,.7); transition:background .12s; }
table.rosa-table tbody tr:last-child { border-bottom:none; }
table.rosa-table tbody tr:hover { background:rgba(74,179,244,.04); }
table.rosa-table td { padding:.58rem .9rem; vertical-align:middle; }

.pl-name { font-weight:700; color:var(--white); }
.pos-badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:.68rem; font-family:'Oswald',sans-serif; letter-spacing:.8px; background:rgba(74,179,244,.12); color:var(--accent); border:1px solid rgba(74,179,244,.2); }
.ca-mono { font-family:'Space Mono',monospace; font-weight:700; font-size:.8rem; }
.ca-e{color:#4ade80} .ca-h{color:#4ab3f4} .ca-m{color:#facc15} .ca-l{color:#f87171}
.pa-mono { font-family:'Space Mono',monospace; font-weight:700; font-size:.8rem; color:var(--purple); }
.nat-cell { font-size:.75rem; color:var(--text2); }
.age-cell { font-size:.8rem; }
.price-cell { font-family:'Space Mono',monospace; font-size:.72rem; color:var(--text2); }

/* wl button */
.wl-btn { background:none; border:none; cursor:pointer; font-size:1rem; color:var(--yellow); padding:0; transition:transform .15s; }
.wl-btn:hover { transform:scale(1.2); }

/* empty */
.empty-state { text-align:center; padding:3rem 1rem; color:var(--text2); font-size:.85rem; }

.squad-logo { width:64px; height:64px; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(0,0,0,.6)); }
.squad-logo-wrap { display:flex; align-items:center; gap:1rem; }
.logo-badge { width:20px; height:20px; object-fit:contain; vertical-align:middle; margin-right:5px; filter:drop-shadow(0 1px 3px rgba(0,0,0,.4)); }
footer { border-top:1px solid var(--border); background:var(--bg2); padding:1rem 2rem; text-align:center; color:var(--text2); font-size:.68rem; letter-spacing:2px; text-transform:uppercase; font-family:'Oswald',sans-serif; }
footer strong { color:var(--cyan); letter-spacing:2px; }

@media(max-width:600px){
  .stat-strip { grid-template-columns:1fr 1fr; }
  .topbar-btn .lbl { display:none; }
}
@media(max-width:400px){
  .stat-strip { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="fmto2.html" class="nav-logo">FMTO 2.0</a>
  <div class="topbar-right">
    <a href="scouting.html"       class="topbar-btn">🔍 <span class="lbl">Scouting</span></a>
    <a href="mister.html"         class="topbar-btn">👥 <span class="lbl">Mister</span></a>
    <a href="area-riservata.html" class="topbar-btn">🔒 <span class="lbl">Area Riservata</span></a>
    <a href="watchlist.html"      class="topbar-btn watchlist-btn">★ Watchlist <span id="watchCount">( )</span></a>
  </div>
</div>

<div class="page-wrap">

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <a href="fmto2.html" class="bread-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Home
    </a>
    <span class="bread-sep">/</span>
    <span class="bread-current" id="breadSquad">—</span>
  </div>

  <!-- HEADER -->
  <div class="page-header">
    <div class="squad-logo-wrap">
      <img id="squadLogo" src="" alt="" class="squad-logo" style="display:none" onerror="this.style.display='none'">
      <div class="squad-title" id="squadTitle">—</div>
    </div>
  </div>

  <!-- STAT STRIP -->
  <div class="stat-strip">
    <div class="stat-tile tile-ca">
      <div class="stat-tile-val" id="statCA">—</div>
      <div class="stat-tile-label">CA Medio</div>
    </div>
    <div class="stat-tile tile-pa">
      <div class="stat-tile-val" id="statPA">—</div>
      <div class="stat-tile-label">PA Medio</div>
    </div>
    <div class="stat-tile tile-age">
      <div class="stat-tile-val" id="statAge">—</div>
      <div class="stat-tile-label">Età Media</div>
    </div>
    <div class="stat-tile tile-u23">
      <div class="stat-tile-val" id="statU23">—</div>
      <div class="stat-tile-label">U23</div>
    </div>
  </div>

  <!-- SORT BAR -->
  <div class="sort-bar">
    <span class="sort-label">Ordina:</span>
    <button class="sort-btn active" onclick="sortBy('ca')">CA ↓</button>
    <button class="sort-btn" onclick="sortBy('pa')">PA</button>
    <button class="sort-btn" onclick="sortBy('age')">Età</button>
    <button class="sort-btn" onclick="sortBy('name')">Nome</button>
    <button class="sort-btn" onclick="sortBy('pos')">Ruolo</button>
  </div>

  <!-- TABELLA -->
  <div class="table-wrap">
    <table class="rosa-table">
      <thead>
        <tr>
          <th style="width:32px"></th>
          <th>Giocatore</th>
          <th>Ruolo</th>
          <th>Età</th>
          <th>CA</th>
          <th>PA</th>
          <th>Nazionalità</th>
          <th>Valore</th>
        </tr>
      </thead>
      <tbody id="rosaBody"></tbody>
    </table>
  </div>

</div>

<footer><strong>FMTO 2.0</strong> — Football Manager Tournament Online</footer>

<script src="data.js"></script>
<script>
// Leggi il parametro ?squad= dall'URL
const params    = new URLSearchParams(window.location.search);
const squadName = params.get('squad') || '';

// Aggiorna titolo e breadcrumb
document.getElementById('squadTitle').textContent  = squadName || '—';
// Logo squadra nell'header
const squadData = SQUADS.find(s => s.name === squadName);
if (squadData && squadData.logo) {
  const logoEl = document.getElementById('squadLogo');
  logoEl.src = squadData.logo;
  logoEl.alt = squadName;
  logoEl.style.display = 'block';
}
document.getElementById('breadSquad').textContent  = squadName || '—';
document.title = `FMTO 2.0 — ${squadName}`;

// Filtra giocatori della squadra
let players = PLAYERS.filter(p => p[2] === squadName);
let currentSort = 'ca';
let sortAsc = false;

// Watchlist helpers
function getWatchlist() {
  try { return JSON.parse(localStorage.getItem('fmto_watchlist') || '[]'); }
  catch(e) { return []; }
}
function isInWatchlist(id) { return getWatchlist().includes(id); }
function toggleWatchlist(id, btn) {
  let ids = getWatchlist();
  if (ids.includes(id)) {
    ids = ids.filter(x => x !== id);
    btn.textContent = '☆';
  } else {
    ids.push(id);
    btn.textContent = '★';
  }
  localStorage.setItem('fmto_watchlist', JSON.stringify(ids));
  document.getElementById('watchCount').textContent = `( ${ids.length} )`;
}

// Formatta prezzo
function formatPrice(v) {
  if (!v || v === 0) return '—';
  if (v >= 1000000) return `${(v/1000000).toFixed(1)}M`;
  if (v >= 1000)    return `${Math.round(v/1000)}K`;
  return v;
}

function caClass(v) {
  if (v>=160) return 'ca-e'; if (v>=130) return 'ca-h'; if (v>=100) return 'ca-m'; return 'ca-l';
}

// Calcola statistiche
function updateStats(list) {
  const cas  = list.map(p=>p[5]).filter(v=>v>0);
  const pas  = list.map(p=>p[6]).filter(v=>v>0);
  const ages = list.map(p=>p[4]).filter(v=>v>0);
  const u23  = list.filter(p=>p[4]<=22).length;

  document.getElementById('statCA').textContent  = cas.length  ? Math.round(cas.reduce((a,b)=>a+b,0)/cas.length)         : '—';
  document.getElementById('statPA').textContent  = pas.length  ? Math.round(pas.reduce((a,b)=>a+b,0)/pas.length)         : '—';
  document.getElementById('statAge').textContent = ages.length ? (ages.reduce((a,b)=>a+b,0)/ages.length).toFixed(1)      : '—';
  document.getElementById('statU23').textContent = `${u23}/${list.length}`;
}

// Ordina
function sortBy(key) {
  if (currentSort === key) {
    sortAsc = !sortAsc;
  } else {
    currentSort = key;
    sortAsc = key === 'name' || key === 'pos';
  }

  // Aggiorna bottoni
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const sortMap = { ca:5, pa:6, age:4, name:1, pos:3 };
  const idx = sortMap[key];

  players = [...players].sort((a,b) => {
    let va = a[idx], vb = b[idx];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortAsc ?  -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  renderTable();
}

function renderTable() {
  const body = document.getElementById('rosaBody');

  if (players.length === 0) {
    body.innerHTML = `<tr><td colspan="8"><div class="empty-state">Nessun giocatore trovato per questa squadra.</div></td></tr>`;
    return;
  }

  body.innerHTML = players.map(p => `
    <tr>
      <td style="text-align:center">
        <button class="wl-btn" onclick="toggleWatchlist(${p[0]}, this)" title="${isInWatchlist(p[0]) ? 'Rimuovi da Watchlist' : 'Aggiungi a Watchlist'}">
          ${isInWatchlist(p[0]) ? '★' : '☆'}
        </button>
      </td>
      <td class="pl-name">${p[1]}</td>
      <td><span class="pos-badge">${p[3]}</span></td>
      <td class="age-cell">${p[4]}</td>
      <td><span class="ca-mono ${caClass(p[5])}">${p[5]}</span></td>
      <td><span class="pa-mono">${p[6]}</span></td>
      <td class="nat-cell">${p[7] || '—'}</td>
      <td class="price-cell">${formatPrice(p[8])}</td>
    </tr>`).join('');
}

// Init
if (!squadName) {
  document.getElementById('rosaBody').innerHTML =
    `<tr><td colspan="8"><div class="empty-state">Nessuna squadra selezionata.</div></td></tr>`;
} else {
  // Ordina per CA desc di default
  players.sort((a,b) => b[5] - a[5]);
  updateStats(players);
  renderTable();
  // Watchlist count
  const wlIds = getWatchlist();
  document.getElementById('watchCount').textContent = `( ${wlIds.length} )`;
}
</script>
</body>
</html>
