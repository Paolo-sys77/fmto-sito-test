<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMTO 2.0 — Mister</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:     #0d1117;
  --bg2:    #10161f;
  --surface:#131b26;
  --card:   #161e2b;
  --card2:  #1a2435;
  --border: #1e2d40;
  --accent: #4ab3f4;
  --accent2:#2196d8;
  --text:   #c9d8e8;
  --text2:  #516475;
  --white:  #eaf2fa;
  --cyan:   #00e5ff;
  --green:  #4ade80;
}

body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }

/* ===== TOPBAR ===== */
.topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 1.2rem; height:50px; display:flex; align-items:center; justify-content:space-between; }
.nav-logo { font-family:'Oswald',sans-serif; font-size:1.15rem; font-weight:700; color:var(--cyan); letter-spacing:2px; text-shadow:0 0 12px rgba(0,229,255,.35); white-space:nowrap; text-decoration:none; line-height:1.15; }
.topbar-right { display:flex; gap:.3rem; align-items:center; flex-wrap:wrap; }
.topbar-btn { background:none; border:none; color:var(--text2); cursor:pointer; font-family:'Barlow',sans-serif; font-size:.75rem; padding:5px 10px; border-radius:4px; transition:color .2s,background .2s; display:flex; align-items:center; gap:4px; white-space:nowrap; text-decoration:none; }
.topbar-btn:hover { color:var(--accent); background:rgba(74,179,244,.07); }
.topbar-btn.active { color:var(--cyan); }
.topbar-btn.watchlist { border:1px solid var(--border); border-radius:20px; padding:4px 12px; }
.topbar-btn .badge { font-size:.68rem; }

/* ===== PAGE ===== */
.page-wrap { max-width:1200px; margin:0 auto; padding:1.2rem 1.2rem 3rem; }

/* breadcrumb */
.breadcrumb { display:flex; align-items:center; gap:.5rem; margin-bottom:1.2rem; }
.bread-back { background:var(--card); border:1px solid var(--border); color:var(--text2); padding:.3rem .8rem; border-radius:6px; font-size:.76rem; font-family:'Barlow',sans-serif; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:.35rem; transition:all .15s; text-decoration:none; }
.bread-back:hover { border-color:var(--accent); color:var(--accent); }
.bread-back svg { width:13px; height:13px; }
.bread-sep { color:var(--text2); font-size:.78rem; }
.bread-current { font-size:.78rem; color:var(--cyan); font-weight:600; }

/* page header */
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:.5rem; }
.page-title { font-family:'Oswald',sans-serif; font-size:1.3rem; font-weight:700; letter-spacing:2px; color:var(--white); display:flex; align-items:center; gap:.5rem; }
.mister-count { font-size:.82rem; color:var(--text2); }

/* search */
.search-wrap { margin-bottom:1rem; }
.search-input {
  width:100%; max-width:360px;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  padding:.65rem 1rem;
  border-radius:10px;
  font-family:'Barlow',sans-serif;
  font-size:.85rem;
  outline:none;
  transition:border-color .2s;
}
.search-input::placeholder { color:var(--text2); }
.search-input:focus { border-color:var(--accent); }

/* ===== TABLE ===== */
.table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:10px; }

table.mister-table { width:100%; border-collapse:collapse; font-size:.83rem; min-width:680px; }

table.mister-table thead tr {
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
table.mister-table thead th {
  padding:.7rem 1rem;
  text-align:left;
  font-family:'Oswald',sans-serif;
  font-size:.68rem;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text2);
  font-weight:400;
  white-space:nowrap;
}

table.mister-table tbody tr {
  border-bottom:1px solid rgba(30,45,64,.7);
  transition:background .12s;
  cursor:default;
}
table.mister-table tbody tr:last-child { border-bottom:none; }
table.mister-table tbody tr:hover { background:rgba(74,179,244,.04); }
table.mister-table td { padding:.65rem 1rem; vertical-align:middle; }

/* squad badge */
.squad-badge {
  display:inline-block;
  background:rgba(0,229,255,.12);
  border:1px solid rgba(0,229,255,.25);
  color:var(--cyan);
  font-family:'Oswald',sans-serif;
  font-size:.72rem;
  font-weight:600;
  letter-spacing:1px;
  padding:3px 10px;
  border-radius:5px;
  white-space:nowrap;
}

/* mister name */
.mister-name { font-weight:700; color:var(--white); font-size:.88rem; }

/* telegram link */
.tg-link { color:var(--cyan); text-decoration:none; font-weight:500; font-size:.83rem; }
.tg-link:hover { text-decoration:underline; }

/* forum */
.forum-cell { color:var(--text2); font-size:.8rem; }

/* ingresso */
.ingresso-cell { font-family:'Space Mono',monospace; font-size:.78rem; color:var(--green); }

/* ultimo cambio */
.cambio-cell { color:var(--text2); font-size:.8rem; }

/* empty / no results */
.logo-badge { width:20px; height:20px; object-fit:contain; vertical-align:middle; margin-right:5px; filter:drop-shadow(0 1px 3px rgba(0,0,0,.4)); }
.no-results { text-align:center; padding:2.5rem; color:var(--text2); font-size:.85rem; }

/* ===== FOOTER ===== */
footer { border-top:1px solid var(--border); background:var(--bg2); padding:1rem 2rem; text-align:center; color:var(--text2); font-size:.68rem; letter-spacing:2px; text-transform:uppercase; font-family:'Oswald',sans-serif; }

@media(max-width:600px){
  .topbar-btn .lbl { display:none; }
  .search-input { max-width:100%; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="fmto2.html" class="nav-logo">FMTO 2.0</a>
  <div class="topbar-right">
    <a href="scouting.html"       class="topbar-btn">🔍 <span class="lbl">Scouting</span></a>
    <a href="mister.html"         class="topbar-btn active">👥 <span class="lbl">Mister</span></a>
    <a href="area-riservata.html" class="topbar-btn">🔒 <span class="lbl">Area Riservata</span></a>
    <a href="watchlist.html"      class="topbar-btn watchlist">★ Watchlist ( )</a>
  </div>
</div>

<div class="page-wrap">

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <a href="fmto2.html" class="bread-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Home
    </a>
    <span class="bread-sep">/</span>
    <span class="bread-current">Mister</span>
  </div>

  <!-- HEADER -->
  <div class="page-header">
    <div class="page-title">👥 RIEPILOGO MISTER</div>
    <div class="mister-count" id="misterCount">56 mister</div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input
      class="search-input"
      type="text"
      id="searchInput"
      placeholder="Cerca per squadra, nome, telegram..."
      oninput="filterTable()"
    >
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table class="mister-table">
      <thead>
        <tr>
          <th>Squadra</th>
          <th>Mister</th>
          <th>Telegram</th>
          <th>Forum</th>
          <th>Ingresso FMTO</th>
          <th>Ultimo Cambio Club</th>
        </tr>
      </thead>
      <tbody id="misterBody"></tbody>
    </table>
  </div>

</div>

<footer>FMTO 2.0 — Football Manager Tournament Online — © 2025</footer>

<script src="data.js"></script>
<script>
/*
  MISTERS — dati anagrafici (compilare manualmente).
  Le statistiche CA/PA/età vengono prese automaticamente da data.js.
*/
const MISTERS = [
  { squad:"AFC Ajax",    name:"Alessandro", telegram:"@alessandromicciullo", forum:"ucavadd",    joinDate:"01/06/2020", lastClub:"—" },
  { squad:"Anderlecht",  name:"Alfredo",    telegram:"@Fred994",             forum:"Dieguito94", joinDate:"01/05/2021", lastClub:"—" },
  /* ← inserire qui tutti gli altri 54 mister */
];

const squadStats = {};
const squadLogos = {};
SQUADS.forEach(s => {
  squadStats[s.name] = s;
  if (s.logo) squadLogos[s.name] = s.logo;
});
function logoHtml(squadName) {
  return squadLogos[squadName]
    ? `<img src="${squadLogos[squadName]}" class="logo-badge" alt="" onerror="this.style.display='none'">`
    : '';
}


function enrichMister(m) {
  const s = squadStats[m.squad] || {};
  return { ...m, avgCA: s.avgCA||'—', avgPA: s.avgPA||'—', avgAge: s.avgAge||'—', u23: s.u23||'—', count: s.count||'—' };
}

let filtered = MISTERS.map(enrichMister);

function renderTable(data) {
  const body  = document.getElementById('misterBody');
  const count = document.getElementById('misterCount');
  count.textContent = `${data.length} mister`;

  if (data.length === 0) {
    body.innerHTML = `<tr><td colspan="6"><div class="no-results">Nessun risultato trovato.</div></td></tr>`;
    return;
  }

  body.innerHTML = data.map(m => `
    <tr>
      <td>${logoHtml(m.squad)}<span class="squad-badge">${m.squad}</span></td>
      <td class="mister-name">${m.name}</td>
      <td>${m.telegram
        ? `<a class="tg-link" href="https://t.me/${m.telegram.replace('@','')}" target="_blank">${m.telegram}</a>`
        : '<span style="color:var(--text2)">—</span>'}</td>
      <td class="forum-cell">${m.forum || '—'}</td>
      <td class="ingresso-cell">${m.joinDate || '—'}</td>
      <td class="cambio-cell">${m.lastClub || '—'}</td>
    </tr>`).join('');
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const base = MISTERS.map(enrichMister);
  filtered = q ? base.filter(m =>
    (m.squad    ||'').toLowerCase().includes(q) ||
    (m.name     ||'').toLowerCase().includes(q) ||
    (m.telegram ||'').toLowerCase().includes(q) ||
    (m.forum    ||'').toLowerCase().includes(q)
  ) : base;
  renderTable(filtered);
}

renderTable(filtered);
</script>
</body>
</html>
